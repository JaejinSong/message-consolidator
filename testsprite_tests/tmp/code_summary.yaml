tech_stacks:
  backend:
    language: Go
    version: "1.25.6"
    framework: gorilla/mux
    database: 
      - Turso (LibSQL)
      - SQLite (modernc.org/sqlite)
    key_libraries:
      - google.golang.org/api (Google API Client)
      - github.com/google/generative-ai-go (Gemini AI)
      - slack-go/slack (Slack API)
      - go.mau.fi/whatsmeow (WhatsApp Web)
      - xuri/excelize (Excel export)
      - github.com/whatap/go-api (Monitoring)
    authentication: 
      - Google OAuth2
      - JWT (auth tokens)
    logging: lumberjack (rotating logs)
    message_processing: 
      - Email reply parsing (recapco/emailreplyparser)
      - Text similarity (hbollon/go-edlib)
    monitoring: WhaTap (RUM)

  frontend:
    language: TypeScript
    framework: Vanilla JavaScript (SPA)
    bundler: Vite
    build_tool: vite (with tsconfig-paths plugin)
    ui_framework: Custom CSS (Glass UI, dark/light theme)
    state_management: Custom (state.ts)
    css_framework:
      - Custom glass-morphism design
      - FontAwesome icons
      - PostCSS with purgecss
    testing: Vitest
    key_libraries:
      - zod (schema validation)
      - marked (markdown parsing)
      - canvas-confetti (animations)
      - pretendard (font)
    localization: 
      - Multi-language support (KO, EN, ID, TH)
      - i18n system (I18N_DATA)
    monitoring: WhaTap Browser Agent (RUM)

  infrastructure:
    deployment: Google Cloud Run (Cloud Run Mode optional)
    container: Docker
    environment_config: .env, .env.local (dotenv)

features:
  - name: Message Consolidation
    description: Consolidates messages from Slack, WhatsApp, and Gmail into a unified dashboard

  - name: Task Management
    description: Categorizes and manages tasks as received, delegated, or reference tasks with status tracking

  - name: AI-Powered Analysis
    description: Uses Google Gemini AI for task classification, merging, and translation

  - name: Multi-Channel Integration
    description: Real-time monitoring of Slack, WhatsApp Web, and Gmail with automatic message scanning

  - name: Smart Task Routing
    description: Automatic task classification based on AI analysis (identity resolution, task extraction)

  - name: Task Merging
    description: Intelligent consolidation of related tasks using AI similarity analysis

  - name: Multi-Language Support
    description: Automatic translation and native support for Korean, English, Indonesian, Thai

  - name: Archival System
    description: Auto-archive completed tasks with configurable retention policies

  - name: Contact Management
    description: Contact linking and alias management across multiple communication channels

  - name: Identity Resolution
    description: AI-powered proposal system to identify and merge duplicate contacts/identities

  - name: Reporting & Analytics
    description: AI-generated weekly/custom reports with task summaries and network visualization

  - name: Data Export
    description: Export tasks to Excel, CSV, JSON, and Notion

  - name: Authentication
    description: Google OAuth2 based authentication with session management

  - name: Token Usage Monitoring
    description: Track Gemini API token consumption with real-time stats

  - name: User Gamification (Legacy)
    description: Points and streak tracking system for task completion

  - name: QR Code Login
    description: WhatsApp connection via QR code scanning

  - name: Subtask Management
    description: Create and track subtasks with assignee tracking

  - name: Deadline Management
    description: Task deadline setting and filtering by deadline urgency

api_endpoints:
  authentication:
    - method: GET
      path: /auth/login
      description: Initiate Google OAuth login flow

    - method: GET
      path: /auth/callback
      description: Google OAuth callback handler

    - method: GET
      path: /auth/logout
      description: Logout and clear session

    - method: GET
      path: /auth/gmail/connect
      description: Connect Gmail account via OAuth

    - method: GET
      path: /auth/gmail/callback
      description: Gmail OAuth callback

  messages:
    - method: GET
      path: /api/messages
      description: Get all active messages/tasks for authenticated user

    - method: GET
      path: /api/messages/archive
      description: Get archived messages with pagination

    - method: GET
      path: /api/messages/archive/count
      description: Get count of archived messages

    - method: POST
      path: /api/messages/done
      description: Mark task(s) as complete

    - method: POST
      path: /api/messages/delete
      description: Soft delete task(s) to archive

    - method: POST
      path: /api/messages/hard-delete
      description: Permanently delete task(s)

    - method: POST
      path: /api/messages/restore
      description: Restore archived task(s)

    - method: POST
      path: /api/messages/update
      description: Update task fields (assignee, category, etc.)

    - method: GET
      path: /api/messages/{id}/original
      description: Get original message content for a task

  exports:
    - method: GET
      path: /api/messages/export
      description: Export archived messages (legacy format)

    - method: GET
      path: /api/messages/export/excel
      description: Export to Excel (.xlsx)

    - method: GET
      path: /api/messages/export/json
      description: Export to JSON

  tasks:
    - method: POST
      path: /api/tasks/merge
      description: Merge multiple tasks into one

    - method: POST
      path: /api/tasks/translate-batch
      description: Batch translate multiple tasks

    - method: POST
      path: /api/subtasks/toggle
      description: Mark subtask as complete/incomplete

  user_info:
    - method: GET
      path: /api/user/info
      description: Get authenticated user profile and stats

    - method: GET
      path: /api/user/stats
      description: Get user statistics (tasks count, completion rate, etc.)

    - method: GET
      path: /api/user/token-usage
      description: Get Gemini API token consumption stats

  aliases:
    - method: GET
      path: /api/user/aliases
      description: Get user's personal name aliases

    - method: POST
      path: /api/user/alias/add
      description: Add personal name alias

    - method: POST
      path: /api/user/alias/delete
      description: Delete personal name alias

    - method: GET
      path: /api/tenant/aliases
      description: Get organization-wide name aliases

    - method: POST
      path: /api/tenant/alias/add
      description: Add organization name alias

    - method: POST
      path: /api/tenant/alias/delete
      description: Delete organization name alias

  contacts:
    - method: GET
      path: /api/contacts/mappings
      description: Get contact name-to-identity mappings

    - method: POST
      path: /api/contacts/mapping/add
      description: Add contact name mapping

    - method: POST
      path: /api/contacts/mapping/delete
      description: Delete contact name mapping

    - method: GET
      path: /api/contacts/search
      description: Search contacts by name or email

    - method: POST
      path: /api/contacts/link
      description: Link multiple account identities

    - method: POST
      path: /api/contacts/unlink
      description: Unlink account identities

    - method: GET
      path: /api/contacts/links
      description: Get all account links

  identity_resolution:
    - method: POST
      path: /api/identity/proposals/generate
      description: Generate AI identity merge proposals

    - method: GET
      path: /api/identity/proposals/job-status
      description: Check AI analysis job status

    - method: GET
      path: /api/identity/proposals
      description: List all identity merge proposals

    - method: POST
      path: /api/identity/proposals/{id}/accept
      description: Accept identity merge proposal

    - method: POST
      path: /api/identity/proposals/{id}/reject
      description: Reject identity merge proposal

  integrations:
    - method: GET
      path: /api/slack/status
      description: Get Slack integration connection status

    - method: GET
      path: /api/whatsapp/qr
      description: Get WhatsApp QR code for login

    - method: GET
      path: /api/whatsapp/status
      description: Get WhatsApp connection status

    - method: POST
      path: /api/whatsapp/logout
      description: Logout from WhatsApp

    - method: GET
      path: /api/gmail/status
      description: Get Gmail connection status

    - method: POST
      path: /api/gmail/disconnect
      description: Disconnect Gmail account

  scanning:
    - method: GET
      path: /api/scan
      description: Manually trigger message scan for user (authenticated)

    - method: GET
      path: /api/internal/scan
      description: Internal endpoint to trigger system-wide scan (requires secret)

  translation:
    - method: POST
      path: /api/translate
      description: Translate task content to specified language

  reporting:
    - method: GET
      path: /api/reports
      description: List all generated reports for user

    - method: POST
      path: /api/reports
      description: Generate new AI analysis report

    - method: GET
      path: /api/reports/{id}
      description: Get specific report by ID

    - method: DELETE
      path: /api/reports/{id}
      description: Delete report

    - method: POST
      path: /api/reports/{id}/translate
      description: Translate report to different language

    - method: POST
      path: /api/reports/{id}/export/notion
      description: Export report to Notion workspace

    - method: GET
      path: /api/reports/history
      description: Get report generation history

  admin:
    - method: GET
      path: /api/admin/reclassify
      description: Re-analyze and reclassify historical tasks using latest AI model

    - method: POST
      path: /api/admin/invalidate-cache
      description: Clear in-memory metadata cache

    - method: GET
      path: /api/admin/restore-gmail-cc
      description: Restore CC field for Gmail-sourced tasks

  health:
    - method: GET
      path: /health
      description: Health check endpoint (no auth required)

  misc:
    - method: GET
      path: /api/release-notes
      description: Get release notes and version updates

authentication_method:
  primary: Google OAuth2
  flow: 
    - User clicks "Login with Google"
    - Redirected to Google consent screen
    - Callback stores JWT in session/cookies
    - AuthMiddleware verifies JWT on protected routes
  session: Cookie-based (HTTP-only cookies recommended)
  protected_routes: All /api/* and /static/* routes require AuthMiddleware

database_schema_highlights:
  main_tables:
    - messages: Task/message records with metadata
    - users: User profiles and WhatsApp JID mapping
    - tokens: API token usage tracking
    - translation_logs: Translation request history
    - reports: Generated AI analysis reports
    - proposals: AI identity merge suggestions
    - alias_mappings: Name-to-identity mappings
    - contacts_links: Account identity relationships
  features:
    - Auto-archival based on completion date and retention policy
    - Soft-delete support (is_deleted flag)
    - Multi-source tracking (Slack, WhatsApp, Gmail)
    - Subtask support with assignee tracking
    - Consolidation metadata for merged tasks
    - Token usage per user tracking
    - Distributed SQLite with Turso sync capability

frontend_features:
  ui_sections:
    - Dashboard: Active task view with tab filtering (Received/Delegated/Reference/All)
    - Archive: Completed/merged/canceled tasks with search and export
    - Insights: Analytics dashboard with completion trends and source distribution
    - Reports: AI-generated weekly reports with network visualization
    - Settings: User preferences, Gmail connection, name mappings, token usage

  visual_components:
    - Task cards with status badges
    - Multi-tab navigation system
    - Modal dialogs (settings, export, delete confirmation, merge confirmation)
    - Status cards for integration health (Slack/WhatsApp/Gmail)
    - QR code scanner modal for WhatsApp login
    - Glass-morphism UI with light/dark theme toggle
    - Toast notifications for user feedback
    - Loading spinners and progress indicators

  real_time_features:
    - Background message scanning (configurable interval)
    - WebSocket polling for status updates
    - Optimistic UI updates with rollback on error
    - Real-time task count badges
    - WhatsApp connection status monitoring
    - Slack integration status display

  data_management:
    - Client-side state management with local caching
    - Automatic serialization/deserialization of complex objects
    - Support for task selection and multi-select operations
    - Search/filter functionality across task properties
    - Pagination for archived tasks

project_description: |
  Message Consolidator Premium is a unified task management platform that aggregates 
  messages from Slack, WhatsApp, and Gmail, using AI (Google Gemini) to intelligently 
  categorize, translate, and consolidate work items. It provides a single dashboard for 
  managing incoming requests, delegated tasks, and reference items with features including 
  AI-powered identity resolution, smart task merging, multi-language support, analytics, 
  and report generation.

key_architectural_patterns:
  - Dependency Injection: API handlers receive services via constructor
  - Middleware Pattern: AuthMiddleware wraps protected routes
  - Inversion of Control: WhatsApp manager uses callback hooks
  - Repository Pattern: Store package abstracts database operations
  - Service Layer: Separation of business logic (AI, reporting, translation)
  - Event-Driven: Frontend uses custom events for state synchronization
  - Graceful Shutdown: Signal handling with ordered cleanup (WhatsApp, DB, HTTP)
  - Circuit Breaker: Error handling for external API calls (Gemini, Gmail, Slack)

development_setup:
  backend:
    - "go mod download"
    - "go run main.go"
    - Environment: .env or cloud environment variables
    - Database: Turso (cloud) or SQLite (local development)
    - Testing: "go test ./..."

  frontend:
    - "npm install"
    - "npm run dev" (Vite dev server on :5173)
    - "npm run build" (Production build to dist/)
    - "npm run test" (Run vitest)

deployment:
  cloud_run: Supported with CLOUD_RUN_MODE=true
  docker: Dockerfile provided in docker/ directory
  environment_variables:
    - TURSO_URL, TURSO_AUTH_TOKEN (database)
    - GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET (OAuth)
    - GEMINI_API_KEY (AI features)
    - SLACK_TOKEN (Slack integration)
    - NOTION_TOKEN, NOTION_REPORT_PAGE_ID (Notion export)
    - WHATAP_LICENSE (monitoring)
    - PORT (default: 8080)

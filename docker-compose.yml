services:
  # Why: Caddy as a standalone reverse proxy and web server for better orchestration.
  caddy:
    image: caddy:2-alpine
    container_name: message-consolidator-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_assets:/usr/share/caddy:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - mc-network

  # Why: Lightweight frontend asset provider. It syncs dist to the shared volume on startup.
  frontend:
    image: ${FE_IMAGE:-us-central1-docker.pkg.dev/gemini-enterprise-487906/message-consolidator-repo/frontend:latest}
    container_name: message-consolidator-frontend
    pull_policy: always
    volumes:
      - caddy_assets:/public
    restart: "no"
    networks:
      - mc-network

  # Why: Backend service providing the REST API.
  backend:
    image: ${BE_IMAGE:-us-central1-docker.pkg.dev/gemini-enterprise-487906/message-consolidator-repo/backend:latest}
    container_name: message-consolidator-backend
    deploy:
      replicas: 1
    pull_policy: always
    env_file:
      - .env
    environment:
      - DISABLE_STATIC_SERVING=true
    volumes:
      - ./db_data:/data
    restart: always
    stop_grace_period: 1m
    networks:
      - mc-network

volumes:
  caddy_data:
  caddy_config:
  caddy_assets:

networks:
  mc-network:
    driver: bridge
